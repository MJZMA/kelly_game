<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0e1117" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Kelly" />
<title>Kelly</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<main id="app">

  <!-- ============== SETTINGS SCREEN ============== -->
  <section class="screen" data-screen="settings">
    <header class="brand">
      <h1>Kelly</h1>
      <p class="tagline">Mental math drill</p>
    </header>

    <div class="setting">
      <label>Mode</label>
      <div class="seg" data-key="mode">
        <button data-val="gambling">Gambling</button>
        <button data-val="investment">Investment</button>
        <button data-val="mixed">Mixed</button>
      </div>
    </div>

    <div class="setting">
      <label>Difficulty</label>
      <div class="seg" data-key="difficulty">
        <button data-val="easy">Easy</button>
        <button data-val="hard">Hard</button>
      </div>
      <p class="hint" id="diffHint"></p>
    </div>

    <div class="setting">
      <label>Duration</label>
      <div class="seg" data-key="duration">
        <button data-val="60">60s</button>
        <button data-val="120">120s</button>
        <button data-val="300">5 min</button>
      </div>
    </div>

    <button class="btn-primary" id="startBtn">Start</button>

    <section class="history" id="history" hidden>
      <h2>Recent</h2>
      <ul id="historyList"></ul>
      <p class="best" id="best"></p>
    </section>

    <p class="formula-ref">
      <strong>Gambling:</strong> f* = p − (1−p)/b<br />
      <strong>Investment:</strong> f* = p/L − (1−p)/G
    </p>
  </section>

  <!-- ============== GAME SCREEN ============== -->
  <section class="screen" data-screen="game" hidden>
    <header class="hud">
      <div class="hud-cell">
        <span class="hud-label">Time</span>
        <span class="hud-value" id="timer">--</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="score">0</span>
      </div>
    </header>

    <div class="question">
      <div class="qtitle" id="qTitle">—</div>
      <div class="qlines" id="qLines"></div>
      <div class="qprompt">Kelly fraction (%)</div>
      <input
        type="text"
        inputmode="numeric"
        pattern="[0-9]*"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        id="answer"
        class="answer"
        aria-label="Answer in percent"
      />
      <div class="feedback" id="feedback">&nbsp;</div>
    </div>

    <div class="game-actions">
      <button class="btn-secondary" id="skipBtn">Skip</button>
      <button class="btn-secondary" id="quitBtn">Quit</button>
    </div>
  </section>

  <!-- ============== RESULTS SCREEN ============== -->
  <section class="screen" data-screen="results" hidden>
    <header class="brand">
      <h1>Time's up</h1>
    </header>

    <div class="result-card">
      <div class="big-number" id="finalScore">0</div>
      <div class="result-detail">
        <span id="finalAccuracy">—</span> accuracy
      </div>
      <div class="result-detail" id="finalBest"></div>
    </div>

    <button class="btn-primary" id="playAgainBtn">Play again</button>
    <button class="btn-secondary wide" id="backToSettingsBtn">Change settings</button>
  </section>

</main>

<script type="module" src="app.js"></script>
</body>
</html>
